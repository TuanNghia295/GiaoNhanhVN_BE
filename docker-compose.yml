services:
  api-giao-nhanh:
    container_name: api
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - giao-nhanh-uploads:/app/uploads
    networks:
      - giao-nhanh-network

networks:
  giao-nhanh-network:
    driver: bridge

volumes:
  giao-nhanh-uploads:
